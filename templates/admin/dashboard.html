<!DOCTYPE html>
<html lang="el">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_style.css') }}">
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>⚙️ Admin</h2>
            <nav>
                <a href="{{ url_for('admin_dashboard') }}">Dashboard</a>
                <a href="{{ url_for('admin_users') }}">Users</a>
                <a href="{{ url_for('admin_teacher_requests') }}">Teacher Requests</a>
                <a href="{{ url_for('admin_achievements') }}">Achievements</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </nav>
        </aside>

        <!-- Main content -->
        <main class="main">
            <h1>📊 Dashboard</h1>

            <div class="dashboard-list">
                <div class="dashboard-item">
                    <i class="fas fa-users"></i>
                    <div>
                        <h4>Total Users</h4>
                        <p>{{ total_users - 1 }}</p>
                    </div>
                </div>

                <div class="dashboard-item">
                    <i class="fas fa-user-graduate"></i>
                    <div>
                        <h4>Students</h4>
                        <p>{{ student_count }}</p>
                    </div>
                </div>

                <div class="dashboard-item">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <div>
                        <h4>Teachers</h4>
                        <p>{{ teacher_count }}</p>
                    </div>
                </div>

                <div class="dashboard-item">
                    <i class="fas fa-calendar-plus"></i>
                    <div>
                        <h4>New Registrations (last 7 days)</h4>
                        <p>{{ recent_registrations }}</p>
                    </div>
                </div>

                <div class="dashboard-item">
                    <i class="fas fa-clock"></i>
                    <div>
                        <h4>Pending Teacher Requests</h4>
                        <p>{{ pending_teacher_requests }}</p>
                    </div>
                </div>
            </div>

        </main>

    </div>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>

</html>
